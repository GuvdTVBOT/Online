<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>GUVD TV BOT</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  :root{
    --brass:#c9a24b;
    --brass-bright:#e8c468;
    --ink:#0a0e1a;
    --signal:#d6534a;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #000;
    overflow: hidden;
  }

  .video-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  video {
    position: absolute;
    top: 50%;
    left: 50%;
    height: 100vw;
    width: 100vh;
    transform: translate(-50%, -50%) rotate(90deg);
    transform-origin: center center;
    object-fit: cover;
    background: #000;
  }

  /* Rotated brand mark, top corner */
  .brand-mark{
    position: fixed;
    top: 3vh;
    right: 3vw;
    z-index: 9998;
    transform: rotate(90deg);
    transform-origin: center center;
    font-family: 'Oswald', Arial, sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--brass-bright);
    text-transform: uppercase;
    text-shadow: 0 2px 6px rgba(0,0,0,.6);
    pointer-events: none;
  }

  .live-pill{
    position: fixed;
    top: 8vh;
    right: 3vw;
    z-index: 9998;
    transform: rotate(90deg);
    transform-origin: center center;
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--signal);
    color: #fff;
    font-family: Arial, sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    pointer-events: none;
  }
  .live-pill .dot{
    width: 6px; height: 6px; border-radius: 50%;
    background: #fff;
    animation: pulse 1.3s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}

  /* 🔙 Orqaga tugmasi (ham albomda buriladi) */
  .back-btn {
    position: fixed;
    bottom: 5vh;
    left: 3vw;
    z-index: 9999;
    padding: 9px 16px;
    font-size: 15px;
    font-weight: 700;
    font-family: Arial, sans-serif;
    border: none;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--brass-bright), var(--brass));
    color: var(--ink);
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    transition: 0.2s;
    transform: rotate(90deg);
    transform-origin: center center;
  }
  .back-btn:active {
    transform: rotate(90deg) scale(0.96);
  }
</style>
</head>
<body>
  <div class="video-wrapper">
    <video id="video" controls autoplay playsinline></video>
    <div class="brand-mark">GUVD TV</div>
    <div class="live-pill"><span class="dot"></span>LIVE</div>
    <button class="back-btn" onclick="goBack()">⬅️ Orqaga</button>
  </div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const channel = urlParams.get("channel");
  const video = document.getElementById("video");
  let hls;

  function getProxyUrl(url) {
    if (url.startsWith("http://")) {
      return "https://tamerkhan.uz/proxy.php?url=" + encodeURIComponent(url);
    }
    return url;
  }

  function loadChannel(url) {
    if (hls) hls.destroy();
    const finalUrl = getProxyUrl(url);

    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(finalUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = finalUrl;
      video.addEventListener("loadedmetadata", () => video.play());
    }
  }

  if (channel) {
    loadChannel(channel);
  }

  function goBack() {
    if (document.referrer) {
      window.history.back();
    } else {
      window.location.href = "index.html";
    }
  }
</script>
</body>
</html>
